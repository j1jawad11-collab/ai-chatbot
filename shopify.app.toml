# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a2b4e2c2889b4840e6a0bd839cd09376"
name = "AI-Chatbot"
application_url = "https://ai-chatbot-sigma-blue-60.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# read_products: lets chatbot fetch product catalog to answer product questions
# read_orders: lets chatbot look up order status for customers
scopes = "read_products,read_orders"

[auth]
redirect_urls = [ "https://ai-chatbot-sigma-blue-60.vercel.app/auth/callback" ]

[app_proxy]
url = "https://ai-chatbot-sigma-blue-60.vercel.app/api/chat"
subpath = "chatbot"
prefix = "apps"
